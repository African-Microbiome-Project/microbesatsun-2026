title: "Microbes at SUN 2026"
subtitle: "Symposium & Training Workshop"
description: "A hands-on symposium and training workshop focused on the use of anvi'o for 'omics' applications. Hosted at Stellenbosch University, 07–11 September 2026."
url: "https://african-microbiome-project.github.io"
baseurl: "/microbesatsun-2026"

repository: "African-Microbiome-Project/microbesatsun-2026"

remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "contrast"  # options: air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise

# Build settings
plugins:
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-sitemap

collections:
  pages:
    output: true
    permalink: /:path/

# Site author
author:
  name: "African Microbiome Group"
  avatar: "/assets/images/AMP.png"
  bio: "Stellenbosch University"
  location: "Stellenbosch, South Africa"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/African-Microbiome-Project"

logo: "/assets/images/AMP.png"
favicon: "/assets/images/AMP.png"

# Navigation
navigation:
  - title: "About"
    url: /about/
  - title: "Agenda"
    url: /agenda/
  - title: "People"
    url: /people/
  - title: "Tutorials"
    url: /tutorials/
  - title: "Registration"
    url: /registration/

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/African-Microbiome-Project"

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor